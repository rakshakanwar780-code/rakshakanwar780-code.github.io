<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riddle 3</title>
<style>
body{font-family:Arial;text-align:center;background:#f4f6ff;padding:40px;}
.box{background:white;padding:25px;border-radius:12px;max-width:500px;margin:auto;}
input,button{padding:10px;margin:10px;width:80%;}
button{background:#667eea;color:white;border:none;border-radius:6px;}
</style>
</head>
<body>

<div class="box">
<h2>Riddle 3</h2>
<p>What has a heart that doesn't beat?</p>

<input id="ans">
<button onclick="check()">Submit</button>
</div>

<script>
function check(){
let a=document.getElementById("ans").value.toLowerCase().trim();
if(a==="artichoke"){
window.location="riddle4.html";
}else{
alert("Wrong answer! Try again.");
}
}
</script>

</body>
</html>
